<svg width="100" height="100" viewBox="20 15 60 75" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pillar/Column Icon - Tightened ViewBox to remove side padding -->
  <g id="icon">
    <!-- Top Cap (Abacus) -->
    <rect x="25" y="25" width="50" height="5" rx="0.5" fill="#921300"/>
    <!-- Capital -->
    <path d="M30 30C30 30 30 40 50 40C70 40 70 30 70 30" stroke="#921300" stroke-width="2.5"/>
    <!-- Shaft (Three flutes) -->
    <rect x="34" y="40" width="7" height="40" rx="0.5" fill="#1A2B48"/>
    <rect x="46.5" y="40" width="7" height="40" rx="0.5" fill="#1A2B48"/>
    <rect x="59" y="40" width="7" height="40" rx="0.5" fill="#1A2B48"/>
    <!-- Base -->
    <rect x="28" y="80" width="44" height="6" rx="0.5" fill="#921300"/>
    <rect x="25" y="86" width="50" height="4" rx="0.5" fill="#1A2B48"/>
    
    <!-- Balance/Scales of Justice -->
    <path d="M50 25V15" stroke="#C5A059" stroke-width="2.5"/>
    <path d="M28 20L72 20" stroke="#C5A059" stroke-width="2.5"/>
    <!-- Scale Left -->
    <path d="M28 20V26C28 26 23 33 28 33C33 33 28 26 28 26" stroke="#C5A059" stroke-width="2" fill="#FDF7F0"/>
    <!-- Scale Right -->
    <path d="M72 20V26C72 26 67 33 72 33C77 33 72 26 72 26" stroke="#C5A059" stroke-width="2" fill="#FDF7F0"/>
  </g>
</svg>
